{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 환자 리스트 (4페이지)</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'emr/css/today_patient_list.css' %}">
</head>
<body>

    <div class="header">
        <div class="logo" onclick="location.href='main.html'">로고</div>
        <div class="user-info">00님</div>
    </div>

    <div class="container">
        <h2>오늘의 환자 리스트</h2>
        
        <div class="card">
            <div class="search-area">
                <input type="text" id="searchQuery" placeholder="검색입력창 (이름 또는 생년월일 입력하세요)">
                <button onclick="searchPatients()">검색</button>
            </div>
        </div>
        
        <div class="card">
            <h3>오늘의 진료 환자 (2025-11-28)</h3>
            
            <div class="patient-list-container">
                <table class="patient-list-table">
                    <thead>
                        <tr>
                            <th>성명</th>
                            <th>성별</th>
                            <th>생년월일</th>
                            <th>방문일자</th>
                        </tr>
                    </thead>

                    <tbody id="patientListBody">
                        <tr onclick="selectPatient(this, '홍길동', '남', '740219', '2025-10-18', '내과', '박○○', '2025-03-10/ J20 급성기관지염', true)">
                            <td>홍길동</td>
                            <td>남</td>
                            <td>740219</td>
                            <td>2025-10-18</td>
                        </tr>
                        <tr onclick="selectPatient(this, '홍길순', '여', '010601', '2025-05-27', '소아과', '이○○', '2025-05-20/ K04 치수 및 근단 주위 조직의 질환', false)">
                            <td>홍길순</td>
                            <td>여</td>
                            <td>010601</td>
                            <td>2025-05-27</td>
                        </tr>
                        <tr onclick="selectPatient(this, '홍길순', '여', '100412', '2024-12-29', '가정의학과', '최○○', '2024-12-29/ L30 상세불명의 피부염', false)">
                            <td>홍길순</td>
                            <td>여</td>
                            <td>100412</td>
                            <td>2024-12-29</td>
                        </tr>
                        <tr onclick="selectPatient(this, '홍길동', '남', '880412', '2025-08-08', '내과', '박○○', '2025-07-20/ I10 본태성 고혈압', true)">
                            <td>홍길동</td>
                            <td>남</td>
                            <td>880412</td>
                            <td>2025-08-08</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="detail-action-container">

                <div class="selected-patient-info" id="selectedPatientInfo" style="display: none;">
                    <h4>선택된 환자 요약 정보 (6)</h4>

                    <div class="info-row" id="summaryPatientInfo"></div>

                    <div class="summary-block">
                        <div class="info-row"><strong>진료과:</strong> <span id="summaryDepartment"></span></div>
                        <div class="info-row"><strong>담당의:</strong> <span id="summaryDoctor"></span></div>
                    </div>

                    <div class="summary-block">
                        <div class="info-row"><strong>최근 진료:</strong> <span id="summaryRecentDiagnosis"></span></div>
                        <div class="info-row" id="summaryOrderExists"></div>
                    </div>
                </div>
                
                <div class="action-buttons" id="actionButtons" style="display: none;">
                    <button class="btn-create" onclick="goToCreateRecord()">진료기록작성</button>
                    <button class="btn-history" onclick="goToPreviousRecords()">이전진료기록</button>
                </div>

            </div>
        </div>
    </div>

    <script src="{% static 'emr/js/today_patient_list.js' %}"></script>
</body>
</html>
