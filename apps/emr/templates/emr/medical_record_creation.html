<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진료 기록 작성</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'emr/css/medical_record_creation.css' %}">
</head>
<body>

    <div class="header">
        <div class="logo">로고</div>
        <div class="user-info">강민경님</div>
    </div>

    <div class="container">
        <h2> 진료 기록 작성</h2>

        <div class="patient-header-info">
            <span><strong>환자명:</strong> 홍길순</span>
            <span><strong>성별:</strong> 여자</span>
            <span><strong>생년월일:</strong> 1990-02-10</span>
            <span><strong>방문일시:</strong> 2025-03-14 09:42</span>
            <span><strong>진료과:</strong> 내과</span>
            <span><strong>담당의:</strong> 박○○</span>
        </div>

        <div class="middle-content-grid">

            <div class="card">
                <div class="section-title">진료기록 작성</div>

                <div class="form-group">
                    <label>진료과</label>
                    <input type="text" value="내과 (자동입력됨)" disabled>
                </div>

                <div class="form-group">
                    <label>담당의사</label>
                    <input type="text" value="정약용 (자동입력됨)" disabled>
                </div>

                <div class="form-group">
                    <label>특이사항</label>
                    <input type="text" placeholder="특이사항을 직접 입력하세요">
                </div>

                <div class="form-group">
                    <label>기록유형</label>
                    <input type="text" placeholder="기록유형을 직접 입력하세요">
                </div>

                <div class="form-group">
                    <label>환자분류</label>
                    <select>
                        <option value="outpatient" selected>외래 환자</option>
                        <option value="inpatient">입원 환자</option>
                        <option value="emergency">응급 환자</option>
                    </select>
                </div>
            </div>

            <div class="card soap-area">
                <div class="section-title">경과기록 (SOAP)</div>

                <div class="form-group">
                    <label for="sNote">S. 주관적 증상 입력</label>
                    <textarea id="sNote"></textarea>
                </div>

                <div class="form-group">
                    <label for="oNote">O. 객관적 소견 입력</label>
                    <textarea id="oNote"></textarea>
                </div>

                <div class="form-group">
                    <label for="aNote">A. 의학적 평가 입력</label>
                    <textarea id="aNote"></textarea>
                </div>

                <div class="form-group">
                    <label for="pNote">P. 치료 계획 입력</label>
                    <textarea id="pNote"></textarea>
                </div>
            </div>

            <div class="card prescription-area">
                <div class="section-title">처방전 작성</div>

                <div class="form-group">
                    <label for="drugName">약품명</label>
                    <div class="drug-input-wrap">
                        <input type="text" id="drugName" placeholder="약품명을 입력하세요">
                        <button class="search-btn-5page" onclick="openDrugSearchModal()">검색</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="drugCode">약품 표준코드</label>
                    <input type="text" id="drugCode" disabled>
                </div>

                <div class="form-group">
                    <label>투약 기간</label>
                    <div class="date-group">
                        <span>시작:</span><input type="date" id="startDate">
                        <span>종료:</span><input type="date" id="endDate">
                    </div>
                </div>

                <div class="form-group">
                    <label>투여 빈도</label>
                    <input type="text" id="freqInput">
                </div>

                <div class="form-group">
                    <label>투여 용량</label>
                    <input type="text" id="doseInput">
                </div>

                <div class="form-group">
                    <label>특이사항</label>
                    <input type="text" id="noteInput">
                </div>

                <button class="order-add-button" onclick="addPrescription()">처방 추가 (+)</button>
            </div>
        </div>

        <div class="bottom-content-grid">

            <div class="card">
                <div class="section-title">추가 오더 설정</div>

                <div class="form-group">
                    <label for="orderType">오더 종류</label>
                    <select id="orderType">
                        <option value="">선택</option>
                        <option value="treatment">치료/처치</option>
                        <option value="lab">검사</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="nurse">담당 간호사</label>
                    <select id="nurse">
                        <option value="">선택</option>
                        <option value="nurse1">김 간호사</option>
                        <option value="nurse2">이 간호사</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>응급 여부</label>
                    <div class="radio-group">
                        <input type="radio" id="emergencyY" name="emergency" value="yes">
                        <label for="emergencyY">예</label>
                        <input type="radio" id="emergencyN" name="emergency" value="no" checked>
                        <label for="emergencyN">아니오</label>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">예약 설정</div>

                <div class="form-group">
                    <label for="reservationDate">예약 일시</label>
                    <input type="datetime-local" id="reservationDate">
                </div>

                <div class="form-group">
                    <label for="reservationType">예약 유형</label>
                    <select id="reservationType">
                        <option value="consultation">진료/상담</option>
                        <option value="test">검사</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="reservationMemo">메모</label>
                    <textarea id="reservationMemo"></textarea>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-save" onclick="saveRecord()">저장</button>
        </div>

    </div>

    <div class="modal-overlay" id="drugSearchModal">
        <div class="modal-content">

            <div class="modal-header">
                약품 검색 모달창
            </div>

            <div class="modal-body">

                <div class="search-controls">
                    <input type="text" id="drugNameInput" placeholder="약품명을 입력한다">
                    <button onclick="performSearch()">검색</button>
                </div>

                <table class="result-table" id="drugResultTable">
                    <thead>
                        <tr>
                            <th>약품명</th>
                            <th>약품코드</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr data-code="200808876" data-name="가스디알정50밀리그램" onclick="selectDrug(this)">
                            <td>가스디알정50밀리그램</td>
                            <td>200808876</td>
                        </tr>
                        <tr data-code="200808877" data-name="페라트라정2.5밀리그램" onclick="selectDrug(this)">
                            <td>페라트라정2.5밀리그램</td>
                            <td>200808877</td>
                        </tr>
                        <tr data-code="200808878" data-name="아세트아미노펜 500mg" onclick="selectDrug(this)">
                            <td>아세트아미노펜 500mg</td>
                            <td>200808878</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="modal-footer">
                <button class="btn-cancel-6page" onclick="closeModal('drugSearchModal')">취소</button>
                <button class="btn-confirm-6page" onclick="confirmSelection()">확인</button>
            </div>

        </div>
    </div>

    <script src="{% static 'emr/js/medical_record_creation.js' %}"></script>
</body>
</html>
