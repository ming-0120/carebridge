{% load static %}

<header class="header">

  <link rel="stylesheet" href="{% static 'core/css/_header.css' %}">

  <div class="header-inner">
    <div class="logo">
        <a href="{% url 'home' %}">
            <img src="{% static 'core/img/logo_2.png' %}" alt="" style="width:200px; margin-top:10px;">
        </a>
    </div>
    <!-- 햄버거 버튼 -->
    <button class="menu-toggle" type="button" aria-label="메뉴 열기">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-wrapper">
      <nav class="nav">
        <a href="#emergency">응급실 조회</a>
        <a href="{% url 'main' %}">병원 예약</a>
        <a href="{% url 'qna:qna_list' %}">QnA</a>
        <a href="{% url 'newsletter_list' %}">메디컬 레터</a>
        <a href="{% url 'infectious_stat' %}">감염병 통계 보기</a>
      </nav>

      <div class="util">
        {% if request.session.username %}
            <span>{{ request.session.username }}님 안녕하세요</span>
            |
            <a href="{% url 'reservation_list' %}">마이페이지</a>
            |
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" style="background:none; border:none; cursor:pointer;">
                    로그아웃
                </button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">로그인</a>
        {% endif %}
      </div>
    </div>
  </div>

</header>
<script>
  const KAKAO_LOGIN_URL = "{% url 'kakao_login' %}";
</script>
<script src="{% static 'core/js/_header.js' %}"></script>
