<div id="region-modal" class="modal-overlay hidden">
  <div class="region-modal-box">

    <div class="region-header">
      <span>시/도 선택</span>
      <button class="modal-close" onclick="closeRegionModal()">×</button>
    </div>

    <input id="region-search-input"
           type="text"
           placeholder="지역명 검색"
           class="region-search"
           onkeydown="if(event.key==='Enter') searchSigungu()" />

    <div class="region-container">
      
      <!-- 시/도 리스트 -->
      <div class="sido-list">
        {% for s in sido_list %}
          <div class="sido-item" onclick="selectSido('{{ s }}')">{{ s }}</div>
        {% endfor %}
      </div>

      <!-- 전체 선택 -->
      <div class="sigungu-list">
        <div class="sigungu-item all" onclick="selectSigungu('전체')">전체</div>

        {% for sg in sigungu_list %}
          <div class="sigungu-item" data-name="{{ sg }}" onclick="selectSigungu('{{ sg }}')">
            {{ sg }}
          </div>
        {% endfor %}
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn reset" onclick="resetRegion()">초기화</button>
      <button class="btn primary" onclick="applyRegionFilter()">적용하기</button>
    </div>

  </div>
</div>
