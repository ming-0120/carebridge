<div id="detail-modal" class="modal-overlay hidden">
  <div class="modal-wrap detail-large">

    <button class="modal-close" onclick="closeDetailModal()">×</button>

    <!-- Header -->
    <div class="detail-header">
      <h1 id="detail-title" class="detail-title"></h1>
      <p id="detail-meta" class="detail-meta"></p>
      <div id="detail-tags" class="tag-row"></div>
    </div>

    <!-- Message Banner -->
    <div id="detail-banner" class="message-banner hidden"></div>

    <!-- 병상 현황 -->
    <h3 class="section-title">병상 현황</h3>

    <div class="detail-bed-grid">

      <div class="bed-item">
        <div id="circle-er" class="circle"></div>
        <div class="bed-label">응급실</div>
        <div id="er-count" class="bed-count"></div>
      </div>

      <div class="bed-item">
        <div id="circle-child" class="circle"></div>
        <div class="bed-label">소아응급</div>
        <div id="child-count" class="bed-count"></div>
      </div>

      <div class="bed-item">
        <div id="circle-birth" class="circle"></div>
        <div class="bed-label">분만실</div>
        <div id="birth-count" class="bed-count"></div>
      </div>

      <div class="bed-item">
        <div id="circle-negative" class="circle"></div>
        <div class="bed-label">음압격리</div>
        <div id="negative-count" class="bed-count"></div>
      </div>

      <div class="bed-item">
        <div id="circle-isolation" class="circle"></div>
        <div class="bed-label">일반격리</div>
        <div id="isolation-count" class="bed-count"></div>
      </div>

      <div class="bed-item">
        <div id="circle-cohort" class="circle"></div>
        <div class="bed-label">코호트</div>
        <div id="cohort-count" class="bed-count"></div>
      </div>

    </div>

    <!-- 하단 2단 구성 -->
    <div class="detail-bottom">

      <!-- AI 리뷰 -->
      <div class="detail-box">
        <h3>AI 리뷰 요약</h3>
        <p id="detail-review">리뷰 데이터 준비중...</p>
      </div>

      <!-- 지도 -->
      <div class="detail-box">
        <h3>위치 / 길찾기</h3>
        <div id="detail-map" class="detail-map">지도 로딩중...</div>
        <button class="btn primary">길찾기</button>
      </div>

    </div>

  </div>
</div>
